<!-- Load Font Awesome from CDN -->
<link
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  rel="stylesheet"
/>

<style>
/* Modal background */
.img-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  padding-top: 40px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0,0,0,0.85);
}

/* Modal image */
.img-modal-content {
  margin: auto;
  display: block;
  max-width: 90%;
  max-height: 90%;
  border-radius: 6px;
}

/* Close button */
.img-modal-close {
  position: absolute;
  top: 20px;
  right: 35px;
  color: #fff;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // Create modal container
  const modal = document.createElement("div");
  modal.className = "img-modal";
  modal.innerHTML = `
    <span class="img-modal-close">&times;</span>
    <img class="img-modal-content" id="img-modal-img">
  `;
  document.body.appendChild(modal);

  const modalImg = document.getElementById("img-modal-img");
  const closeBtn = modal.querySelector(".img-modal-close");

  // Add click handler to all images with class="zoomable"
  document.querySelectorAll("img.zoomable").forEach(img => {
    img.style.cursor = "zoom-in";
    img.addEventListener("click", () => {
      modal.style.display = "block";
      modalImg.src = img.src;
    });
  });

  // Close modal
  closeBtn.onclick = () => modal.style.display = "none";
  modal.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
  };

});
</script>

<script>
(function () {
  // Quarto injects site_libs/ scripts on every page with a path relative to
  // that page's depth. Extracting the prefix from any such src gives us the
  // exact relative path back to the site root — no hardcoding needed.
  var siteLibScript = document.querySelector('script[src*="site_libs/"]');
  var root = siteLibScript
    ? siteLibScript.getAttribute('src').replace(/site_libs\/.*$/, '')
    : '';

  window._dbPath    = root + 'pilot_vannmiljo.sqlite';
  window._sqljsBase = root + 'libs/sqljs/';

  window._sqlJsReady = new Promise(function (resolve, reject) {
    var s = document.createElement('script');
    s.src = window._sqljsBase + 'sql-wasm.js';
    s.onload = function () {
      initSqlJs({
        locateFile: function () { return window._sqljsBase + 'sql-wasm.wasm'; }
      }).then(resolve).catch(reject);
    };
    s.onerror = function () {
      reject(new Error('Failed to load: ' + s.src));
    };
    document.head.appendChild(s);
  });
}());
</script>
