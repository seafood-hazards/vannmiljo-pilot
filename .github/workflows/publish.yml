name: Publish Quarto Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpng-dev \
            libgdal-dev \
            gdal-bin \
            libproj-dev \
            libgeos-dev \
            libudunits2-dev \
            libtiff5-dev \
            libcairo2-dev \
            libxml2-dev \
            libcurl4-openssl-dev \
            libnode-dev \
            libharfbuzz-dev \
            libfribidi-dev

      - name: Restore renv packages
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Render site
        run: quarto render

      # Prevent Jekyll from mangling .wasm and other binary files
      - name: Add .nojekyll
        run: touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4